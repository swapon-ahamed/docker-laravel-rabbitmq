services:
  nginx:
    image: nginx:latest
    container_name: laravel_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./var/www:/var/www
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - php
    networks:
      - lempnet

  php:
    build:
      context: ./config/php-fpm
    container_name: laravel_php
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./var/www:/var/www
      - ./config/php-fpm/php.ini:/usr/local/etc/php/php.ini:ro
      - ./config/php-fpm/www.conf:/usr/local/etc/php-fpm.d/www.conf:ro
    ports:
      - "9000:9000"
    depends_on:
      - mysql
      - redis
      - rabbitmq
    networks:
      - lempnet

  mysql:
    image: mysql:8.0
    container_name: laravel_mysql
    restart: unless-stopped
    ports:
      - "3476:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: root
      MYSQL_ROOT_HOST: "%"
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - ./data/mysql:/var/lib/mysql
    networks:
      - lempnet

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: laravel_phpmyadmin
    restart: unless-stopped
    ports:
      - "8060:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: laravel
      PMA_PASSWORD: root
      UPLOAD_LIMIT: 300M
    depends_on:
      - mysql
    networks:
      - lempnet

  redis:
    image: redis:7-alpine
    container_name: laravel_redis
    restart: unless-stopped
    command: redis-server --requirepass atbRedis
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    networks:
      - lempnet

  rabbitmq:
    image: rabbitmq:3-management
    container_name: laravel_rabbitmq
    restart: unless-stopped
    hostname: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - lempnet

networks:
  lempnet:
    driver: bridge

volumes:
  rabbitmq_data: