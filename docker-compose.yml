services:
  nginx:
    image: nginx:latest
    container_name: ${PROJECT_NAME}_NGNIX
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./var/www:/var/www
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - php
    networks:
      - lempnet

  php:
    build:
      context: ./config/php-fpm
    container_name: ${PROJECT_NAME}_PHP_FPM
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./var/www:/var/www
      - ./config/php-fpm/php.ini:/usr/local/etc/php/php.ini:ro
      - ./config/php-fpm/www.conf:/usr/local/etc/php-fpm.d/www.conf:ro
    ports:
      - "9000:9000"
    depends_on:
      - mysqldb
      - redis
      - rabbitmq
    networks:
      - lempnet

  mysqldb:
      container_name: ${PROJECT_NAME}_MYSQL
      image: 'mysql:8.0.41'
      volumes:
          - './data/mysql:/var/lib/mysql'
      restart: on-failure
      environment:
          - MYSQL_ROOT_HOST=${MYSQL_HOST}
          - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
          - MYSQL_USER=${MYSQL_USER}
          - MYSQL_PASSWORD=${MYSQL_PASSWORD}
          - MYSQL_DATABASE=${MYSQL_DATABASE}
          - INNODB_FAST_SHUTDOWN=0
      ports:
          - '${MYSQL_PORT}:3306'
      expose:
          - '${MYSQL_PORT}'    
      networks:
          - lempnet

  phpmyadmin:
      container_name: ${PROJECT_NAME}_PHPMYADMIN
      image: phpmyadmin/phpmyadmin
      restart: on-failure
      ports:
          - '8060:80'
      environment:
          - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
          - PMA_HOST=mysqldb
          - UPLOAD_LIMIT=300M
      depends_on:
          - mysqldb
      networks:
          - lempnet 

  redis:
      container_name: ${PROJECT_NAME}_REDIS
      image: "redis:alpine"
      restart: on-failure
      command: redis-server --requirepass "${REDIS_PASSWORD}"
      ports:
          - "6379:6379"
      volumes:
          - './data/redis:/var/lib/redis'
          - './config/redis/redis.conf:/usr/local/etc/redis/redis.conf'
      environment:
          - REDIS_REPLICATION_MODE=master
      networks:
          - lempnet  

  rabbitmq:
    image: rabbitmq:3-management
    container_name: ${PROJECT_NAME}_rabbitmq
    restart: unless-stopped
    hostname: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - lempnet

networks:
  lempnet:
    driver: bridge

volumes:
  rabbitmq_data: